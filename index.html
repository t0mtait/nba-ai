<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --card: #111118; --card-hover: #16161d; --border: rgba(255,255,255,0.08);
            --text: #f0f0f5; --text-muted: #888899; --text-dim: #555566;
            --green: #3ecf6a; --green-dim: rgba(62,207,106,0.15); --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
            --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.2); --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.15);
            --radius: 16px; --radius-sm: 10px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        .header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.3rem; font-weight: 800; } .logo span { color: var(--green); }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .card-title { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn { padding: 8px 16px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover:not(:disabled) { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
        .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; font-size: 0.85rem; color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.active { background: var(--green); }
        .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
        .status-dot.error { background: var(--red); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .spinner-wrap { display: none; justify-content: center; padding: 40px; }
        .spinner-wrap.show { display: flex; }
        .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { display: none; padding: 12px 16px; background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); color: var(--red); font-size: 0.85rem; margin-bottom: 12px; }
        .error-msg.show { display: block; }
        .success-msg { display: none; padding: 12px 16px; background: var(--green-dim); border: 1px solid rgba(62,207,106,0.3); border-radius: var(--radius-sm); color: var(--green); font-size: 0.85rem; margin-bottom: 12px; }
        .success-msg.show { display: block; }
        .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .table-wrap th { padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-muted); background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table-wrap td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .table-wrap tr:last-child td { border-bottom: none; }
        .table-wrap tr:hover td { background: rgba(255,255,255,0.02); }
        .no-data { text-align: center; color: var(--text-muted); padding: 30px !important; }
        /* Badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .badge.high { background: var(--green-dim); color: var(--green); }
        .badge.medium { background: var(--amber-dim); color: var(--amber); }
        .badge.bet { background: var(--green-dim); color: var(--green); }
        .badge.pass { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .badge.inj { background: var(--red-dim); color: var(--red); }
        .team-badge { font-weight: 700; }
        .vs { color: var(--text-muted); margin: 0 6px; font-size: 0.8rem; }
        /* Tabs */
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .tab-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
        /* Power Rankings */
        .pr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .pr-entry { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
        .pr-entry-header { display: flex; align-items: center; gap: 10px; }
        .pr-rank { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-dim); color: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; flex-shrink: 0; }
        .pr-team-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
        .pr-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pr-input-group { display: flex; flex-direction: column; gap: 3px; }
        .pr-input-group label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .pr-input-group input { width: 100%; padding: 6px 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; font-weight: 600; }
        .pr-input-group input:focus { outline: none; border-color: var(--green); }
        /* Injuries */
        .inj-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .inj-row:last-child { border-bottom: none; }
        .inj-player { font-weight: 600; min-width: 120px; }
        .inj-details { flex: 1; font-size: 0.85rem; color: var(--text-muted); }
        .inj-status { font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
        .inj-status.out { background: var(--red-dim); color: var(--red); }
        .inj-status.questionable { background: var(--amber-dim); color: var(--amber); }
        .inj-status.probable { background: var(--blue-dim); color: var(--blue); }
        .inj-row-main { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .inj-player { font-weight: 600; min-width: 80px; font-size: 0.8rem; }
        .inj-details { flex: 1; }
        .inj-name { font-weight: 600; margin-bottom: 2px; }
        .inj-injury { font-size: 0.8rem; color: var(--text-muted); }
        .inj-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
        .inj-stats { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .inj-impact { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
        .inj-impact.high { background: var(--red-dim); color: var(--red); }
        .inj-impact.medium { background: var(--amber-dim); color: var(--amber); }
        .inj-impact.low { background: var(--blue-dim); color: var(--blue); }
        .inj-impact.none { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .will-play-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; white-space: nowrap; }
        .will-play-toggle label { color: var(--text-muted); cursor: pointer; }
        .will-play-toggle input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--green); cursor: pointer; }
        /* Backtest */
        .backtest-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .backtest-stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .backtest-stat .value { font-size: 1.8rem; font-weight: 800; color: var(--green); }
        .backtest-stat .value.negative { color: var(--red); }
        .backtest-stat .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        /* Forms */
        .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); }
        .form-group input, .form-group select { padding: 8px 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
        /* Search */
        .team-search { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .team-search select { padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
        .prob-display { display: flex; flex-direction: column; gap: 2px; font-size: 0.8rem; }
        .prob-row { display: flex; align-items: center; gap: 6px; }
        .prob-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; max-width: 80px; }
        .prob-fill { height: 100%; border-radius: 3px; }
        .prob-fill.home { background: var(--green); }
        .prob-fill.away { background: var(--red); }
        .hidden { display: none !important; }
        .section-divider { height: 1px; background: var(--border); margin: 20px 0; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🏀 NBA <span>Predictions</span></div>
        <div style="display:flex;gap:8px">
            <button class="btn" id="trainBtn">Train Model</button>
        </div>
    </header>

    <div class="container">
        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Loading...</span>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="predictions">Tonight's Games</button>
            <button class="tab-btn" data-tab="power-rankings">Power Rankings</button>
            <button class="tab-btn" data-tab="injuries">Injuries</button>
            <button class="tab-btn" data-tab="backtest">Backtest</button>
        </div>

        <!-- PREDICTIONS TAB -->
        <div id="predictionsTab">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        <span id="predictionsTitle">Tonight's Games</span>
                    </div>
                    <button class="btn" id="refreshPredBtn">Refresh</button>
                </div>
                <div class="spinner-wrap" id="predSpinner"><div class="spinner"></div></div>
                <div class="table-wrap" id="predTableWrap" style="display:none;">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th><th>Matchup</th><th>Win Probability</th><th>Moneyline</th>
                                <th>Spread</th><th>Spread Rec</th><th>Conf</th>
                            </tr>
                        </thead>
                        <tbody id="predBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- POWER RANKINGS TAB -->
        <div id="powerRankingsTab" class="hidden">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                        Power Rankings — <span id="prSeasonLabel">2025-26</span>
                    </div>
                    <div style="display:flex;gap:8px">
                        <input type="number" id="prSeasonInput" value="2026" min="2017" max="2030" style="padding:6px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);width:80px;font-size:0.85rem">
                        <button class="btn" id="loadPrBtn">Load</button>
                        <button class="btn btn-green" id="savePrBtn">Save Rankings</button>
                    </div>
                </div>
                <div class="spinner-wrap" id="prSpinner"><div class="spinner"></div></div>
                <div id="prGrid" class="pr-grid"></div>
            </div>

            <div class="card" style="margin-top:16px">
                <div class="card-header">
                    <div class="card-title">H2H History</div>
                </div>
                <div class="team-search">
                    <select id="h2hTeam1"><option value="">Team</option></select>
                    <span style="color:var(--text-muted)">vs</span>
                    <select id="h2hTeam2"><option value="">Opponent</option></select>
                    <button class="btn btn-sm" id="loadH2HBtn">Load H2H</button>
                </div>
                <div id="h2hResults"></div>
            </div>
        </div>

        <!-- INJURIES TAB -->
        <div id="injuriesTab" class="hidden">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        Injury Reports
                    </div>
                    <div style="display:flex;gap:8px">
                        <select id="injuryTeamFilter" style="padding:6px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem">
                            <option value="">All Teams</option>
                        </select>
                        <button class="btn" id="loadInjuriesBtn">Refresh</button>
                        <button class="btn" id="addInjuryBtn" style="background:var(--green)">+ Add Injury</button>
                    </div>
                </div>
                <div class="spinner-wrap" id="injSpinner"><div class="spinner"></div></div>
                <div id="injuriesList"></div>
            </div>

            <!-- Add Injury Form -->
            <div class="card" style="margin-top:16px;display:none" id="addInjuryForm">
                <div class="card-header"><div class="card-title">Add Injury</div></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Team</label>
                        <select id="injFormTeam"></select>
                    </div>
                    <div class="form-group">
                        <label>Player</label>
                        <input type="text" id="injFormPlayer" placeholder="Player name">
                    </div>
                    <div class="form-group">
                        <label>Injury</label>
                        <input type="text" id="injFormInjury" placeholder="e.g. Ankle">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="injFormStatus">
                            <option value="questionable">Questionable</option>
                            <option value="probable">Probable</option>
                            <option value="doubtful">Doubtful</option>
                            <option value="out">Out</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date Reported</label>
                        <input type="date" id="injFormDate">
                    </div>
                    <div class="form-group">
                        <label>Season Year</label>
                        <input type="number" id="injFormSeason" value="2026" min="2017" max="2030">
                    </div>
                </div>
                <div style="display:flex;gap:8px;margin-top:8px">
                    <button class="btn btn-green" id="submitInjuryBtn">Save Injury</button>
                    <button class="btn" id="cancelInjuryBtn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- BACKTEST TAB -->
        <div id="backtestTab" class="hidden">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg>
                        Backtest Results
                    </div>
                    <button class="btn" id="runBacktestBtn">Run Backtest</button>
                </div>
                <div class="spinner-wrap" id="backtestSpinner"><div class="spinner"></div></div>
                <div id="backtestSummary" class="backtest-summary" style="display:none"></div>
                <div id="backtestDetails" style="display:none">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>Date</th><th>Matchup</th><th>Bet</th><th>Prob</th><th>Result</th></tr>
                            </thead>
                            <tbody id="backtestBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const TEAM_NAMES = {
        "ATL":"Atlanta Hawks","BOS":"Boston Celtics","BKN":"Brooklyn Nets","CHA":"Charlotte Hornets",
        "CHI":"Chicago Bulls","CLE":"Cleveland Cavaliers","DAL":"Dallas Mavericks","DEN":"Denver Nuggets",
        "DET":"Detroit Pistons","GSW":"Golden State Warriors","HOU":"Houston Rockets","IND":"Indiana Pacers",
        "LAC":"Los Angeles Clippers","LAL":"Los Angeles Lakers","MEM":"Memphis Grizzlies","MIA":"Miami Heat",
        "MIL":"Milwaukee Bucks","MIN":"Minnesota Timberwolves","NOP":"New Orleans Pelicans","NYK":"New York Knicks",
        "OKC":"Oklahoma City Thunder","ORL":"Orlando Magic","PHI":"Philadelphia 76ers","PHO":"Phoenix Suns",
        "POR":"Portland Trail Blazers","SAC":"Sacramento Kings","SAS":"San Antonio Spurs","TOR":"Toronto Raptors",
        "UTA":"Utah Jazz","WAS":"Washington Wizards"
    };
    const TEAM_CODES = Object.keys(TEAM_NAMES);

    function setStatus(text, state='') {
        document.getElementById('statusDot').className = 'status-dot ' + state;
        document.getElementById('statusText').textContent = text;
    }
    function showError(msg) { const e=document.getElementById('errorMsg'); e.textContent=msg; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),5000); }
    function showSuccess(msg) { const e=document.getElementById('successMsg'); e.textContent=msg; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),3000); }
    function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    // ---- Tab Switching ----
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',e=>{
        document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
        e.currentTarget.classList.add('active');
        const tab=e.currentTarget.dataset.tab;
        document.querySelectorAll('[id$="Tab"]').forEach(t=>t.classList.add('hidden'));
        document.getElementById(tab+'Tab').classList.remove('hidden');
        if(tab==='predictions') loadPredictions();
        if(tab==='power-rankings') loadPowerRankings();
        if(tab==='injuries') loadInjuries();
        if(tab==='backtest') loadBacktest();
    }));

    // ---- Predictions ----
    async function loadPredictions() {
        const sp=document.getElementById('predSpinner'), tw=document.getElementById('predTableWrap');
        sp.classList.add('show'); tw.style.display='none';
        setStatus('Loading predictions...','loading');
        try {
            const resp=await fetch('/predictions');
            if(!resp.ok) throw new Error((await resp.json()).detail);
            const data=await resp.json();
            renderPredictions(data.predictions||[]);
            setStatus(`Loaded ${data.count} game${data.count!==1?'s':''}`,'active');
        } catch(e) { showError(e.message); setStatus(e.message,'error'); }
        finally { sp.classList.remove('show'); }
    }
    function renderPredictions(preds) {
        const tbody=document.getElementById('predBody');
        const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
        document.getElementById('predictionsTitle').textContent="Tonight's Games — "+today;
        if(!preds.length){ tbody.innerHTML='<tr><td colspan="7" class="no-data">No games found</td></tr>'; document.getElementById('predTableWrap').style.display='block'; return; }
        tbody.innerHTML=preds.map(p=>{
            if(p.status==='completed') return `<tr><td>${esc(p.game_time||'--')}</td><td><span class="team-badge">${esc(p.home_team)}</span><span class="vs">vs</span><span class="team-badge">${esc(p.away_team)}</span></td><td colspan="5" class="no-data" style="text-align:center">Final — ${p.home_score??'?'}-${p.away_score??'?'}</td></tr>`;
            const ml=p.moneyline, sp=p.spread||{};
            const homeProb=Math.round((ml.home.win_probability||0)*100);
            const awayProb=100-homeProb;
            const homeMl=ml.home.recommendation.startsWith('BET')?`<span class="badge bet">${esc(ml.home.recommendation)}</span>`:`<span class="badge pass">PASS</span>`;
            const awayMl=ml.away.recommendation.startsWith('BET')?`<span class="badge bet">${esc(ml.away.recommendation)}</span>`:`<span class="badge pass">PASS</span>`;
            const spBadge=sp&&sp.recommendation?(sp.recommendation.startsWith('BET')?`<span class="badge bet">${esc(sp.recommendation)}</span>`:`<span class="badge pass">${sp.recommendation}</span>`):`<span class="badge pass">N/A</span>`;
            const conf=sp&&sp.confidence?`<span class="badge ${sp.confidence}">${sp.confidence}</span>`:'--';
            return `<tr>
                <td>${esc(p.game_time||'--')}</td>
                <td><span class="team-badge">${esc(p.home_team)}</span><span class="vs">vs</span><span class="team-badge">${esc(p.away_team)}</span></td>
                <td><div class="prob-display"><div class="prob-row"><span style="color:var(--green);width:32px">${homeProb}%</span><span style="color:var(--text-dim)">${esc(p.home_team)}</span></div><div class="prob-row"><span style="color:var(--red);width:32px">${awayProb}%</span><span style="color:var(--text-dim)">${esc(p.away_team)}</span></div></div></td>
                <td><div style="display:flex;flex-direction:column;gap:2px">${homeMl}${awayMl}</div></td>
                <td style="font-variant-numeric:tabular-nums">${sp&&sp.predicted_spread!=null?(sp.predicted_spread>0?'+':'')+sp.predicted_spread:'--'}</td>
                <td>${spBadge}</td>
                <td>${conf}</td>
            </tr>`;
        }).join('');
        document.getElementById('predTableWrap').style.display='block';
    }
    document.getElementById('refreshPredBtn').addEventListener('click',loadPredictions);
    window.addEventListener('load',loadPredictions);

    // ---- Power Rankings ----
    let currentPrEntries = TEAM_CODES.map(code=>({team:code,rank:15,power_rating:0,net_rtg:0,ortg_override:null,drtg_override:null,notes:""}));

    function renderPrGrid(entries) {
        const grid=document.getElementById('prGrid');
        const sorted=[...entries].sort((a,b)=>a.rank-b.rank);
        grid.innerHTML=sorted.map(e=>`
            <div class="pr-entry" data-team="${e.team}">
                <div class="pr-entry-header">
                    <div class="pr-rank">${e.rank}</div>
                    <div class="pr-team-name">${e.team} ${TEAM_NAMES[e.team]?'('+TEAM_NAMES[e.team].split(' ').slice(-1)[0]+')':''}</div>
                </div>
                <div class="pr-inputs">
                    <div class="pr-input-group"><label>Rating</label><input type="number" step="0.1" value="${e.power_rating}" data-field="power_rating" onchange="updatePrEntry('${e.team}',this.dataset.field,this.value)"></div>
                    <div class="pr-input-group"><label>Net RTG</label><input type="number" step="0.1" value="${e.net_rtg}" data-field="net_rtg" onchange="updatePrEntry('${e.team}',this.dataset.field,parseFloat(this.value)||0)"></div>
                </div>
            </div>`).join('');
    }

    window.updatePrEntry = function(team,field,value) {
        const e=currentPrEntries.find(x=>x.team===team);
        if(e) e[field]=value;
    };

    async function loadPowerRankings() {
        const season=parseInt(document.getElementById('prSeasonInput').value)||2026;
        document.getElementById('prSeasonLabel').textContent=`${season-1}-${String(season).slice(-2)}`;
        const sp=document.getElementById('prSpinner');
        sp.classList.add('show');
        // Show default grid immediately so something is visible
        renderPrGrid(currentPrEntries);
        try {
            const resp=await fetch(`/api/power-rankings/${season}`);
            const data=await resp.json();
            const entries=data.entries||[];
            if(entries.length>0) {
                currentPrEntries=entries.map(e=>({team:e.team,rank:e.rank||15,power_rating:e.power_rating||0,net_rtg:e.net_rtg||0,ortg_override:e.ortg_override||null,drtg_override:e.drtg_override||null,notes:e.notes||""}));
                renderPrGrid(currentPrEntries);
            }
        } catch(e) { showError(e.message); }
        finally { sp.classList.remove('show'); }
    }

    document.getElementById('loadPrBtn').addEventListener('click',loadPowerRankings);
    document.getElementById('savePrBtn').addEventListener('click',async()=>{
        const season=parseInt(document.getElementById('prSeasonInput').value)||2026;
        const entries=currentPrEntries.map(e=>({...e}));
        try {
            const resp=await fetch('/api/power-rankings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({season_year:season,entries})});
            if(!resp.ok) throw new Error((await resp.json()).detail);
            showSuccess('Power rankings saved!');
        } catch(e) { showError(e.message); }
    });

    // ---- H2H ----
    function populateTeamSelects() {
        const opts='<option value="">Team</option>'+TEAM_CODES.map(c=>`<option value="${c}">${c} - ${TEAM_NAMES[c]}</option>`).join('');
        document.getElementById('h2hTeam1').innerHTML=opts;
        document.getElementById('h2hTeam2').innerHTML=opts;
        document.getElementById('injuryTeamFilter').innerHTML='<option value="">All Teams</option>'+opts.replace('<option value="">Team</option>','');
        document.getElementById('injFormTeam').innerHTML=opts.replace('<option value="">Team</option>','');
    }
    populateTeamSelects();

    document.getElementById('loadH2HBtn').addEventListener('click',async()=>{
        const t1=document.getElementById('h2hTeam1').value, t2=document.getElementById('h2hTeam2').value;
        if(!t1||!t2) { showError('Select both teams'); return; }
        try {
            const resp=await fetch(`/api/h2h/${t1}/vs/${t2}`);
            const data=await resp.json();
            const results=document.getElementById('h2hResults');
            if(!data.total_games) { results.innerHTML='<div class="no-data">No H2H games found</div>'; return; }
            const allGames=[...(data.this_season||[]),...(data.last_season||[])];
            results.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Location</th><th>Result</th><th>Score</th></tr></thead><tbody>${allGames.slice(0,20).map(g=>`<tr><td>${esc(g.date||'')}</td><td>${esc(g.location||'')}</td><td class="${g.result==='W'?'win':'loss'}">${esc(g.result||'')}</td><td>${esc(g.team_score??'?')}-${esc(g.opponent_score??'?')}</td></tr>`).join('')}</tbody></table></div>`;
        } catch(e) { showError(e.message); }
    });

    // ---- Injuries ----
    async function loadInjuries() {
        const team=document.getElementById('injuryTeamFilter').value;
        const sp=document.getElementById('injSpinner');
        sp.classList.add('show');
        try {
            const url=team?`/api/injuries?team=${team}`:'/api/injuries';
            const resp=await fetch(url);
            const data=await resp.json();
            const list=document.getElementById('injuriesList');
            if(!data.injuries||!data.injuries.length) {
                list.innerHTML='<div class="no-data">No injuries found. <button class="btn btn-green" onclick="fetchInjuries()" style="margin-top:12px">Fetch from ESPN</button></div>';
                return;
            }
            list.innerHTML=data.injuries.map(i=>{
                const impact=i.player_impact_score||0;
                const impactClass=impact>=3?'high':impact>=1.5?'medium':impact>0?'low':'none';
                const stats=i.player_pts?`${Number(i.player_pts).toFixed(1)}ppg / ${Number(i.player_min).toFixed(1)}min`:'No stats';
                const willPlayChecked=(i.will_play!==0);
                return `<div class="inj-row" style="flex-direction:column;gap:6px">
                    <div class="inj-row-main">
                        <div class="inj-player">${esc(i.team)}</div>
                        <div class="inj-details">
                            <div class="inj-name">${esc(i.player_name||'?')} <span class="inj-status ${esc(i.status||'questionable')}">${esc((i.status||'').toUpperCase())}</span></div>
                            <div class="inj-injury">${esc(i.injury||'Unknown injury')}</div>
                            <div class="inj-meta">
                                <span class="inj-stats" title="Per-game stats">${stats}</span>
                                ${impact>0?`<span class="inj-impact ${impactClass}" title="Impact if player misses game">-${impact.toFixed(1)} impact</span>`:''}
                                <span class="will-play-toggle">
                                    <input type="checkbox" id="wp-${i.id}" ${willPlayChecked?'checked':''} onchange="toggleWillPlay(${i.id},this.checked)">
                                    <label for="wp-${i.id}">Will Play</label>
                                </span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-red" onclick="deleteInjury(${i.id})" title="Delete">✕</button>
                    </div>
                </div>`;
            }).join('');
        } catch(e) { showError(e.message); }
        finally { sp.classList.remove('show'); }
    }

    window.toggleWillPlay = async function(id, willPlay) {
        try {
            const resp = await fetch(`/api/injuries/${id}?will_play=${willPlay?1:0}`, {method: 'PATCH'});
            if (!resp.ok) throw new Error('Failed to update');
            showSuccess(willPlay ? 'Player marked as WILL PLAY — no impact penalty' : 'Player marked as WILL MISS — impact penalty applied');
        } catch(e) { showError(e.message); }
    };

    async function fetchInjuries() {
        const sp=document.getElementById('injSpinner');
        sp.classList.add('show');
        try {
            const resp = await fetch('/api/injuries/fetch', {method: 'POST'});
            const data = await resp.json();
            showSuccess(`Fetched ${data.fetched} injuries from ESPN`);
            loadInjuries();
        } catch(e) { showError(e.message); }
        finally { sp.classList.remove('show'); }
    }

    window.deleteInjury = async function(id) {
        try {
            await fetch(`/api/injuries/${id}`,{method:'DELETE'});
            showSuccess('Injury deleted');
            loadInjuries();
        } catch(e) { showError(e.message); }
    };

    document.getElementById('loadInjuriesBtn').addEventListener('click',fetchInjuries);
    document.getElementById('addInjuryBtn').addEventListener('click',()=>document.getElementById('addInjuryForm').style.display='block');
    document.getElementById('cancelInjuryBtn').addEventListener('click',()=>document.getElementById('addInjuryForm').style.display='none');
    document.getElementById('submitInjuryBtn').addEventListener('click',async()=>{
        const body={team:document.getElementById('injFormTeam').value,player_name:document.getElementById('injFormPlayer').value,injury:document.getElementById('injFormInjury').value,status:document.getElementById('injFormStatus').value,date_reported:document.getElementById('injFormDate').value,season_year:parseInt(document.getElementById('injFormSeason').value)};
        if(!body.team||!body.player_name) { showError('Team and player are required'); return; }
        try {
            const resp=await fetch('/api/injuries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            if(!resp.ok) throw new Error((await resp.json()).detail);
            showSuccess('Injury saved');
            document.getElementById('addInjuryForm').style.display='none';
            loadInjuries();
        } catch(e) { showError(e.message); }
    });

    // ---- Backtest ----
    async function loadBacktest() {
        // Just show empty state, user clicks Run
        document.getElementById('backtestSummary').style.display='none';
        document.getElementById('backtestDetails').style.display='none';
    }

    document.getElementById('runBacktestBtn').addEventListener('click',async()=>{
        const sp=document.getElementById('backtestSpinner');
        sp.classList.add('show');
        try {
            const resp=await fetch('/api/backtest');
            if(!resp.ok) throw new Error((await resp.json()).detail);
            const data=await resp.json();
            const sum=document.getElementById('backtestSummary');
            sum.style.display='grid';
            sum.innerHTML=`
                <div class="backtest-stat"><div class="value">${data.accuracy||0}%</div><div class="label">Accuracy (bets only)</div></div>
                <div class="backtest-stat"><div class="value">${data.games_bet||0}</div><div class="label">Games Bet</div></div>
                <div class="backtest-stat"><div class="value ${data.roi_units<0?'negative':''}">${data.roi_units>0?'+':''}${data.roi_units||0}</div><div class="label">ROI (units)</div></div>
                <div class="backtest-stat"><div class="value ${data.roi_pct<0?'negative':''}">${data.roi_pct>0?'+':''}${data.roi_pct||0}%</div><div class="label">ROI %</div></div>
                <div class="backtest-stat"><div class="value">${data.games_passed||0}</div><div class="label">Games Passed</div></div>
                <div class="backtest-stat"><div class="value">${data.total_games||0}</div><div class="label">Total Test Games</div></div>`;
            const det=document.getElementById('backtestDetails');
            det.style.display='block';
            const tbody=document.getElementById('backtestBody');
            tbody.innerHTML=(data.details||[]).map(r=>`<tr>
                <td>${esc(r.date||'')}</td><td>${esc(r.matchup||'')}</td><td>${esc(r.bet||'')}</td><td>${r.prob||'--'}</td>
                <td style="color:${r.result==='WIN'?'var(--green)':r.result==='LOSS'?'var(--red)':'var(--text-muted)'}">${esc(r.result||'--')}</td>
            </tr>`).join('');
        } catch(e) { showError(e.message); }
        finally { sp.classList.remove('show'); }
    });

    // ---- Train ----
    document.getElementById('trainBtn').addEventListener('click',async()=>{
        const btn=document.getElementById('trainBtn');
        btn.disabled=true; setStatus('Training models...','loading');
        try {
            const resp=await fetch('/api/train',{method:'POST'});
            const data=await resp.json();
            if(!resp.ok) throw new Error(data.detail||'Training failed');
            setStatus(`Trained! ML acc: ${data.results?.moneyline?.test_accuracy||'?'}%`,'active');
            showSuccess('Models trained successfully');
            loadPredictions();
        } catch(e) { showError(e.message); setStatus('Training failed','error'); }
        finally { btn.disabled=false; }
    });
    </script>
</body>
</html>
